<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vinyl Vault</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f0eb;color:#1a1a1a;min-height:100vh}
  header{background:#1a1a1a;color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
  header h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
  header p{font-size:12px;opacity:0.6;margin-top:2px}
  .disc{width:36px;height:36px;background:#2dd4bf;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px}
  .stat{background:#fff;border-radius:12px;padding:14px;text-align:center}
  .stat-num{font-size:28px;font-weight:800;color:#1a1a1a}
  .stat-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
  .controls{padding:0 16px 12px}
  .search{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #ddd;font-size:15px;background:#fff;margin-bottom:10px}
  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
  .filter-btn{padding:8px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:13px;white-space:nowrap;cursor:pointer;transition:all 0.2s}
  .filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .tab-bar{display:flex;background:#fff;border-bottom:1px solid #eee;padding:0 16px}
  .tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;color:#888;border-bottom:2px solid transparent}
  .tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
  .records{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
  .card{background:#fff;border-radius:14px;display:flex;gap:12px;padding:12px;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .cover{width:64px;height:64px;border-radius:8px;object-fit:cover;background:#eee;flex-shrink:0}
  .cover-placeholder{width:64px;height:64px;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:24px}
  .info{flex:1;min-width:0}
  .artist{font-size:13px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .album{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:2px 0}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
  .tag-high{background:#fee2e2;color:#dc2626}
  .tag-medium{background:#fef3c7;color:#d97706}
  .tag-low{background:#d1fae5;color:#059669}
  .tag-genre{background:#e0e7ff;color:#4f46e5}
  .tag-owned{background:#d1fae5;color:#059669}
  .tag-want{background:#fef3c7;color:#d97706}
  .status-btn{padding:6px 12px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto;flex-shrink:0}
  .status-btn.owned{background:#d1fae5;color:#059669}
  .status-btn.want{background:#fef3c7;color:#d97706}
  .add-section{padding:16px}
  .add-card{background:#fff;border-radius:14px;padding:16px}
  .add-card h3{font-size:16px;font-weight:700;margin-bottom:14px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-group label{font-size:12px;font-weight:600;color:#666}
  .form-group input,.form-group select{padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
  .submit-btn{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
  .loading{text-align:center;padding:40px;color:#888}
  .error{text-align:center;padding:40px;color:#dc2626}
  .empty{text-align:center;padding:40px;color:#888;font-size:15px}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;z-index:100}
  .nav-btn{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:600;color:#888;cursor:pointer;border:none;background:none}
  .nav-btn.active{color:#1a1a1a}
  main{padding-bottom:70px}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:opacity 0.3s;z-index:200;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <div class="disc">🎵</div>
  <div>
    <h1>Vinyl Vault</h1>
    <p>Live from Google Sheets</p>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="owned-count">-</div><div class="stat-label">Owned</div></div>
    <div class="stat"><div class="stat-num" id="want-count">-</div><div class="stat-label">Want</div></div>
    <div class="stat"><div class="stat-num" id="total-count">-</div><div class="stat-label">Total</div></div>
  </div>

  <div class="tab-bar">
    <div class="tab active" id="tab-owned" onclick="switchTab('owned')">My Collection</div>
    <div class="tab" id="tab-want" onclick="switchTab('want')">Want List</div>
    <div class="tab" id="tab-add" onclick="switchTab('add')">+ Add</div>
  </div>

  <div id="section-owned">
    <div class="controls">
      <input class="search" id="search-owned" placeholder="Search artist or album..." oninput="renderOwned()"/>
      <div class="filters" id="filters-owned"></div>
    </div>
    <div class="records" id="records-owned"><div class="loading">Loading your collection...</div></div>
  </div>

  <div id="section-want" style="display:none">
    <div class="controls">
      <input class="search" id="search-want" placeholder="Search want list..." oninput="renderWant()"/>
      <div class="filters" id="filters-want"></div>
    </div>
    <div class="records" id="records-want"><div class="loading">Loading want list...</div></div>
  </div>

  <div id="section-add" style="display:none">
    <div class="add-section">
      <div class="add-card">
        <h3>Add a Record</h3>
        <div class="form-row">
          <div class="form-group">abel>Artist</label><input id="f-artist" placeholder="Artist name"/></div>
          <div class="form-group">abel>Album</label><input id="f-album" placeholder="Album title"/></div>
        </div>
        <div class="form-row">
          <div class="form-group">abel>Status</label>
            <select id="f-status">
              <option value="Owned">Owned</option>
              <option value="Want">Want</option>
            </select>
          </div>
          <div class="form-group">abel>Genre</label><input id="f-genre" placeholder="e.g. Hip-Hop"/></div>
        </div>
        <div class="form-row">
          <div class="form-group">abel>Priority</label>
            <select id="f-priority">
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
          <div class="form-group">abel>Source List</label>
            <select id="f-source">
              <option value="Owned collection">Owned collection</option>
              <option value="Hip Hop Evolution">Hip Hop Evolution</option>
              <option value="Rick Rubin">Rick Rubin</option>
              <option value="LCD Losing My Edge">LCD Losing My Edge</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:10px">abel>Notes</label><input id="f-notes" placeholder="Optional notes"/></div>
        <button class="submit-btn" onclick="addRecord()">Save Record</button>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '1IpetK_EynQ5HLbjcEoQi_ewlkRnEi9UX__JIvw_ugZM';
const SHEET_NAME = 'Collection_Master';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqJRWPH8KtfXrRuXxplr0IKAhI-pQos6nS56uIS9k/exec';

let allRecords = [];
let activeFilter = {owned: 'All', want: 'All'};
let currentTab = 'owned';

async function fetchSheet() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('Fetch failed');
    const text = await res.text();
    return parseCSV(text);
  } catch(e) {
    return null;
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h.trim().replace(/^"|"$/g,'')] = (vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  }).filter(r => r.Artist && r.Album);
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') {
      if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (line[i] === ',' && !inQuotes) {
      result.push(current); current = '';
    } else current += line[i];
  }
  result.push(current);
  return result;
}

async function getCoverArt(artist, album) {
  try {
    const q = encodeURIComponent(`${artist} ${album}`);
    const res = await fetch(`https://itunes.apple.com/search?term=${q}&entity=album&limit=1`);
    const data = await res.json();
    if (data.results && data.results[0]) {
      return data.results[0].artworkUrl100.replace('100x100bb','500x500bb');
    }
  } catch(e) {}
  return null;
}

function makeLanes(records) {
  const lanes = ['All', ...new Set(records.map(r => r['Source List']).filter(Boolean))];
  return lanes;
}

function buildFilters(containerId, lanes, type) {
  const el = document.getElementById(containerId);
  el.innerHTML = lanes.map(l =>
    `<button class="filter-btn ${activeFilter[type]===l?'active':''}" onclick="setFilter('${type}','${
