<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Vault</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom scrollbar and minor tweaks */
        .active-tab {
            border-bottom-width: 3px;
            border-color: #3b82f6;
            color: #1d4ed8;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <header class="bg-gray-800 shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-yellow-400 flex items-center gap-2">
                <span>💿</span> Vinyl Vault
            </h1>
            <div id="loading-spinner" class="animate-spin text-yellow-400 text-xl hidden">⏳</div>
        </div>
        
        <nav class="max-w-md mx-auto px-2 flex border-t border-gray-700 text-sm">
            <button onclick="switchTab('owned')" id="tab-owned" class="flex-1 py-3 text-center text-gray-400 hover:text-gray-200 focus:outline-none active-tab">
                My Collection
            </button>
            <button onclick="switchTab('want')" id="tab-want" class="flex-1 py-3 text-center text-gray-400 hover:text-gray-200 focus:outline-none">
                Want List
            </button>
            <button onclick="switchTab('add')" id="tab-add" class="flex-1 py-3 text-center text-gray-400 hover:text-gray-200 focus:outline-none">
                + Add Record
            </button>
        </nav>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24">
        
        <section id="stats-bar" class="grid grid-cols-3 gap-2 mb-4 bg-gray-800 p-3 rounded-lg text-center shadow">
            <div>
                <p class="text-xs text-gray-400 uppercase">Owned</p>
                <p id="stat-owned" class="text-lg font-bold text-green-400">0</p>
            </div>
            <div>
                <p class="text-xs text-gray-400 uppercase">Want</p>
                <p id="stat-want" class="text-lg font-bold text-blue-400">0</p>
            </div>
            <div>
                <p class="text-xs text-gray-400 uppercase">Total</p>
                <p id="stat-total" class="text-lg font-bold text-yellow-400">0</p>
            </div>
        </section>

        <section id="controls" class="space-y-3 mb-4">
            <input type="text" id="search-input" oninput="filterAndRender()" placeholder="🔍 Search artist or album..." 
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400 placeholder-gray-500">
            
            <div class="flex flex-wrap gap-1 items-center">
                <span class="text-xs text-gray-400 mr-1">Source:</span>
                <button onclick="setSourceFilter('ALL')" id="filter-all" class="bg-yellow-500 text-gray-900 px-2 py-1 rounded text-xs font-semibold">All</button>
                <button onclick="setSourceFilter('Owned collection')" id="filter-owned-coll" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-xs">Owned Coll.</button>
                <button onclick="setSourceFilter('Hip Hop Evolution')" id="filter-hiphop" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-xs">Hip Hop</button>
                <button onclick="setSourceFilter('Rick Rubin')" id="filter-rubin" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-xs">Rick Rubin</button>
                <button onclick="setSourceFilter('LCD Losing My Edge')" id="filter-lcd" class="bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded text-xs">LCD List</button>
            </div>
        </section>

        <section id="message-container" class="hidden my-4 p-4 rounded-lg text-center"></section>

        <section id="view-owned" class="space-y-3">
            <div id="records-owned" class="space-y-3"></div>
        </section>

        <section id="view-want" class="hidden space-y-3">
            <div id="records-want" class="space-y-3"></div>
        </section>

        <section id="view-add" class="hidden bg-gray-800 p-4 rounded-lg shadow">
            <h2 class="text-lg font-bold mb-4 text-yellow-400">Add New Vinyl</h2>
            <form id="add-record-form" onsubmit="submitRecord(event)" class="space-y-4 text-sm">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Artist *</label>
                    <input type="text" id="form-artist" required class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Album *</label>
                    <input type="text" id="form-album" required class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Status *</label>
                    <select id="form-status" required class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
                        <option value="Owned">Owned</option>
                        <option value="Want">Want</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Genre</label>
                    <input type="text" id="form-genre" placeholder="e.g. Rock, Hip Hop, Electronic" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Priority</label>
                    <select id="form-priority" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Source List</label>
                    <select id="form-source" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
                        <option value="Owned collection">Owned collection</option>
                        <option value="Hip Hop Evolution">Hip Hop Evolution</option>
                        <option value="Rick Rubin">Rick Rubin</option>
                        <option value="LCD Losing My Edge">LCD Losing My Edge</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Notes</label>
                    <textarea id="form-notes" rows="2" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400"></textarea>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-2.5 rounded transition shadow">
                    Save to Vault
                </button>
            </form>
        </section>

    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1IpetK_EynQ5HLbjcEoQi_ewlkRnEi9UX__JIvw_ugZM/export?format=csv&sheet=Collection_Master';
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqJRWPH8KtfXrRuXxplr0IKAhI-pQos6nS56uIS9k/exec';

        let allRecords = [];
        let currentTab = 'owned'; // 'owned' | 'want' | 'add'
        let currentSourceFilter = 'ALL';

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            fetchSheet();
        });

        // Show/Hide Loading States
        function toggleLoading(show) {
            const spinner = document.getElementById('loading-spinner');
            if (show) spinner.classList.remove('hidden');
            else spinner.classList.add('hidden');
        }

        // Show Application Alerts/Errors
        function showMessage(text, isError = false) {
            const container = document.getElementById('message-container');
            container.className = `my-4 p-4 rounded-lg text-center ${isError ? 'bg-red-900/80 text-red-200 border border-red-700' : 'bg-green-900/80 text-green-200 border border-green-700'}`;
            container.innerText = text;
            container.classList.remove('hidden');
        }

        function clearMessage() {
            document.getElementById('message-container').classList.add('hidden');
        }

        // Pull and Parse Data from Google Sheets
        async function fetchSheet() {
            toggleLoading(true);
            clearMessage();
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('Network response failure.');
                const data = await response.text();
                
                allRecords = parseCSV(data);
                calculateStats();
                filterAndRender();
            } catch (error) {
                console.error('Error fetching sheet:', error);
                showMessage('Failed to load data from Google Sheets. Please check your connection or configuration.', true);
                // Blank out lists cleanly instead of hanging on loading
                document.getElementById('records-owned').innerHTML = '';
                document.getElementById('records-want').innerHTML = '';
            } finally {
                toggleLoading(false);
            }
        }

        // Clean CSV parser handling quotes, commas, and line endings (\r\n, \r, \n)
        function parseCSV(text) {
            // Standardize line endings exactly as specified
            const lines = text.trim().replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
            if (lines.length < 2) return [];

            // Simple header parsing to map index allocations dynamically
            const headers = splitCSVLine(lines[0]).map(h => h.trim().toLowerCase());
            
            const artistIdx = headers.indexOf('artist');
            const albumIdx = headers.indexOf('album');
            const statusIdx = headers.indexOf('status');
            const genreIdx = headers.indexOf('genre');
            const priorityIdx = headers.indexOf('priority');
            const sourceIdx = headers.indexOf('source list');
            const notesIdx = headers.indexOf('notes');

            const records = [];

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const columns = splitCSVLine(lines[i]);
                
                records.push({
                    artist: columns[artistIdx] || '',
                    album: columns[albumIdx] || '',
                    status: columns[statusIdx] || 'Owned',
                    genre: columns[genreIdx] || '',
                    priority: columns[priorityIdx] || 'Medium',
                    sourceList: columns[sourceIdx] || '',
                    notes: columns[notesIdx] || ''
                });
            }
            return records;
        }

        // Helper to split a CSV line properly accounting for entries encapsulated in quotes
        function splitCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim().replace(/^"|"$/g, ''));
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim().replace(/^"|"$/g, ''));
            return result;
        }

        // Aggregate Metrics Dashboard
        function calculateStats() {
            const ownedCount = allRecords.filter(r => r.status.toLowerCase() === 'owned').length;
            const wantCount = allRecords.filter(r => r.status.toLowerCase() === 'want').length;
            
            document.getElementById('stat-owned').innerText = ownedCount;
            document.getElementById('stat-want').innerText = wantCount;
            document.getElementById('stat-total').innerText = allRecords.length;
        }

        // Tab Management Routing
        function switchTab(tabName) {
            currentTab = tabName;
            clearMessage();

            // Toggle active classes on tab items
            document.getElementById('tab-owned').classList.toggle('active-tab', tabName === 'owned');
            document.getElementById('tab-want').classList.toggle('active-tab', tabName === 'want');
            document.getElementById('tab-add').classList.toggle('active-tab', tabName === 'add');

            // Toggle viewport structural visibility
            document.getElementById('view-owned').classList.toggle('hidden', tabName !== 'owned');
            document.getElementById('view-want').classList.toggle('hidden', tabName !== 'want');
            document.getElementById('view-add').classList.toggle('hidden', tabName !== 'add');

            // Hide controls and metrics elements on data intake view
            const standardUiHidden = (tabName === 'add');
            document.getElementById('stats-bar').classList.toggle('hidden', standardUiHidden);
            document.getElementById('controls').classList.toggle('hidden', standardUiHidden);

            if (!standardUiHidden) {
                filterAndRender();
            }
        }

        // Handle Source filter assignment toggles
        function setSourceFilter(value) {
            currentSourceFilter = value;
            
            // Clean active classes across filter button row
            const buttons = {
                'ALL': 'filter-all',
                'Owned collection': 'filter-owned-coll',
                'Hip Hop Evolution': 'filter-hiphop',
                'Rick Rubin': 'filter-rubin',
                'LCD Losing My Edge': 'filter-lcd'
            };

            Object.keys(buttons).forEach(key => {
                const btn = document.getElementById(buttons[key]);
                if (key === value) {
                    btn.className = "bg-yellow-500 text-gray-900 px-2 py-1 rounded text-xs font-semibold";
                } else {
                    btn.className = "bg-gray-800 hover:bg-gray-700 text-gray-300 px-2 py-1 rounded text-xs";
                }
            });

            filterAndRender();
        }

        // Filter and Build HTML DOM Lists Dynamically
        function filterAndRender() {
            const searchKeyword = document.getElementById('search-input').value.toLowerCase();
            
            const targetContainerId = currentTab === 'owned' ? 'records-owned' : 'records-want';
            const targetElement = document.getElementById(targetContainerId);
            if (!targetElement) return;

            // Step 1: Base filtration by Tab allocation
            let filtered = allRecords.filter(r => r.status.toLowerCase() === currentTab);

            // Step 2: Extract filter constraints based on chosen Source metadata
            if (currentSourceFilter !== 'ALL') {
                filtered = filtered.filter(r => r.sourceList.toLowerCase() === currentSourceFilter.toLowerCase());
            }

            // Step 3: Match Search strings across Artists and Albums fields
            if (searchKeyword) {
                filtered = filtered.filter(r => 
                    r.artist.toLowerCase().includes(searchKeyword) || 
                    r.album.toLowerCase().includes(searchKeyword)
                );
            }

            // Render output
            if (filtered.length === 0) {
                targetElement.innerHTML = `<p class="text-center text-sm text-gray-500 py-8">No records match your filters.</p>`;
                return;
            }

            targetElement.innerHTML = filtered.map(record => {
                // Determine styling badges dynamically based on structural metadata rules
                const priorityColor = record.priority.toLowerCase() === 'high' ? 'bg-red-900 text-red-200' : 
                                      record.priority.toLowerCase() === 'low' ? 'bg-gray-700 text-gray-300' : 
                                      'bg-yellow-900/50 text-yellow-200';

                const statusColor = record.status.toLowerCase() === 'owned' ? 'bg-green-900 text-green-200' : 'bg-blue-900 text-blue-200';

                return `
                    <div class="bg-gray-800 p-4 rounded-lg shadow border border-gray-700 flex flex-col justify-between space-y-3">
                        <div>
                            <div class="flex justify-between items-start gap-2">
                                <h3 class="font-bold text-base text-white tracking-tight leading-tight">${record.album}</h3>
                                <span class="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded shadow-sm shrink-0 ${statusColor}">
                                    ${record.status}
                                </span>
                            </div>
                            <p class="text-sm text-gray-300 font-medium mt-0.5">${record.artist}</p>
                            
                            ${record.notes ? `<p class="text-xs text-gray-400 mt-2 italic bg-gray-900/40 p-2 rounded border-l-2 border-gray-600">${record.notes}</p>` : ''}
                        </div>

                        <div class="flex flex-wrap gap-1 text-[10px] font-semibold pt-1">
                            ${record.genre ? `<span class="bg-purple-900 text-purple-200 px-2 py-0.5 rounded">${record.genre}</span>` : ''}
                            <span class="${priorityColor} px-2 py-0.5 rounded">Priority: ${record.priority}</span>
                            ${record.sourceList ? `<span class="bg-cyan-900 text-cyan-200 px-2 py-0.5 rounded max-w-[150px] truncate" title="${record.sourceList}">${record.sourceList}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Post Intake Form Entries to Google Apps Script Endpoint
        async function submitRecord(event) {
            event.preventDefault();
            clearMessage();

            const submitBtn = document.getElementById('submit-btn');
            const originalBtnText = submitBtn.innerText;
            
            // Collect runtime form values mapped payload strings
            const payload = {
                Artist: document.getElementById('form-artist').value.trim(),
                Album: document.getElementById('form-album').value.
